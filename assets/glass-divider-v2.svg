<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 64" width="900" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#04040f"/>
      <stop offset="50%"  stop-color="#07071a"/>
      <stop offset="100%" stop-color="#04040f"/>
    </linearGradient>

    <!-- Glass panel gradient -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="50%"  stop-color="#00BFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5865F2" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Animated iridescent shimmer sweeping left to right -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0">
        <animate attributeName="offset" values="-0.5;1.5" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="8%"   stop-color="#00BFFF" stop-opacity="0.35">
        <animate attributeName="offset" values="-0.42;1.58" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="16%"  stop-color="#ffffff"  stop-opacity="0.12">
        <animate attributeName="offset" values="-0.34;1.66" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="24%"  stop-color="#a78bfa"  stop-opacity="0.25">
        <animate attributeName="offset" values="-0.26;1.74" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="32%"  stop-color="#5865F2"  stop-opacity="0.2">
        <animate attributeName="offset" values="-0.18;1.82" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%"  stop-color="#ffffff"  stop-opacity="0">
        <animate attributeName="offset" values="-0.10;1.90" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Top edge gradient -->
    <linearGradient id="topEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#04040f"  stop-opacity="1"/>
      <stop offset="20%"  stop-color="#00BFFF"  stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#ffffff"  stop-opacity="0.35"/>
      <stop offset="80%"  stop-color="#5865F2"  stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#04040f"  stop-opacity="1"/>
    </linearGradient>

    <!-- Bottom edge gradient -->
    <linearGradient id="botEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#04040f"  stop-opacity="1"/>
      <stop offset="25%"  stop-color="#5865F2"  stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#a78bfa"  stop-opacity="0.2"/>
      <stop offset="75%"  stop-color="#00BFFF"  stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#04040f"  stop-opacity="1"/>
    </linearGradient>

    <!-- Liquid distortion -->
    <filter id="liq" x="-5%" y="-20%" width="110%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.02" numOctaves="2" seed="7" result="noise">
        <animate attributeName="baseFrequency" values="0.04 0.02;0.06 0.03;0.035 0.018;0.05 0.025;0.04 0.02" dur="10s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Glow filter for edges -->
    <filter id="edgeGlow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for glass panel -->
    <clipPath id="clip">
      <rect x="60" y="16" width="780" height="32" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="64" fill="url(#bg)"/>

  <!-- Glass panel body with liquid distortion -->
  <g filter="url(#liq)">
    <rect x="60" y="16" width="780" height="32" rx="16" fill="url(#glassFill)"/>
  </g>

  <!-- Shimmer sweep on top -->
  <rect x="60" y="16" width="780" height="32" rx="16" fill="url(#sweep)" clip-path="url(#clip)"/>

  <!-- Top glowing edge -->
  <line x1="80" y1="16" x2="820" y2="16"
        stroke="url(#topEdge)" stroke-width="1.2"
        filter="url(#edgeGlow)"/>

  <!-- Bottom glowing edge -->
  <line x1="80" y1="48" x2="820" y2="48"
        stroke="url(#botEdge)" stroke-width="0.8"
        filter="url(#edgeGlow)"/>

  <!-- Center diamond -->
  <polygon points="450,24 458,32 450,40 442,32"
           fill="none" stroke="#00BFFF" stroke-width="1" stroke-opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.9;0.3;0.9" dur="2.8s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="450,27 455,32 450,37 445,32"
           fill="#00BFFF" fill-opacity="0.7">
    <animate attributeName="fill-opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </polygon>

  <!-- Left dot cluster -->
  <circle cx="370" cy="32" r="2" fill="#5865F2" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="32" r="1.5" fill="#00BFFF" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="408" cy="32" r="1.2" fill="#a78bfa" fill-opacity="0.4">
    <animate attributeName="fill-opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Right dot cluster -->
  <circle cx="530" cy="32" r="1.2" fill="#a78bfa" fill-opacity="0.4">
    <animate attributeName="fill-opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="510" cy="32" r="1.5" fill="#00BFFF" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.5;0.9;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="492" cy="32" r="2" fill="#5865F2" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>

</svg>
